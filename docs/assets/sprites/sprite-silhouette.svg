  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
    <rect width="32" height="48" fill="none"/>
    <!-- Spiky hair -->
    <rect x="14" y="0" width="4" height="2" fill="#02091a"/>
    <rect x="13" y="1" width="6" height="3" fill="#02091a"/>
    <rect x="12" y="3" width="8" height="2" fill="#02091a"/>
    <rect x="11" y="4" width="10" height="2" fill="#02091a"/>
    <!-- Head -->
    <rect x="12" y="6" width="8" height="6" fill="#02091a"/>
    <rect x="13" y="6" width="6" height="6" fill="#071634"/>
    <rect x="13" y="12" width="6" height="2" fill="#02091a"/>
    <!-- Shoulders -->
    <rect x="9" y="14" width="14" height="4" fill="#02091a"/>
    <rect x="12" y="14" width="4" height="2" fill="#071634"/>
    <!-- Body with coat -->
    <rect x="8" y="18" width="16" height="10" fill="#02091a"/>
    <rect x="10" y="19" width="12" height="8" fill="#071634"/>
    <!-- Belt -->
    <rect x="9" y="28" width="14" height="2" fill="#02091a"/>
    <!-- Coat tails -->
    <rect x="7" y="20" width="2" height="12" fill="#02091a"/>
    <rect x="23" y="20" width="2" height="12" fill="#02091a"/>
    <!-- Legs -->
    <rect x="10" y="30" width="5" height="10" fill="#02091a"/>
    <rect x="17" y="30" width="5" height="10" fill="#02091a"/>
    <!-- Boots -->
    <rect x="9" y="40" width="7" height="4" fill="#02091a"/>
    <rect x="16" y="40" width="7" height="4" fill="#02091a"/>
    <!-- Sword (Buster-style) -->
    <rect x="28" y="6" width="4" height="26" fill="#02091a"/>
    <rect x="29" y="6" width="2" height="26" fill="#071634"/>
    <rect x="27" y="10" width="1" height="18" fill="#02091a"/>
    <rect x="32" y="10" width="1" height="18" fill="#02091a"/>
    <!-- Sword guard -->
    <rect x="27" y="8" width="6" height="2" fill="#02091a"/>
    <!-- Cape -->
    <rect x="4" y="16" width="4" height="16" fill="#02091a"/>
    <rect x="3" y="18" width="1" height="14" fill="#02091a"/>
    <!-- Mako glow on sword -->
    <rect x="30" y="14" width="1" height="2" fill="#74ff98"/>
    <rect x="30" y="18" width="1" height="2" fill="#74ff98"/>
    <rect x="30" y="22" width="1" height="2" fill="#74ff98"/>
  </svg>
