<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 24" shape-rendering="crispEdges">
  <rect width="32" height="24" fill="none"/>
  <!-- Hull -->
  <rect x="4"  y="14" width="24" height="4" fill="#7a4f2a"/>
  <rect x="6"  y="18" width="20" height="2" fill="#5c3a1e"/>
  <rect x="8"  y="20" width="16" height="2" fill="#3d2510"/>
  <!-- Hull highlight -->
  <rect x="4"  y="14" width="24" height="1" fill="#c08040"/>
  <!-- Mast -->
  <rect x="15" y="4"  width="2"  height="10" fill="#c8a96e"/>
  <!-- Sail (white with accent) -->
  <rect x="9"  y="5"  width="6"  height="8" fill="#d9f1ff"/>
  <rect x="9"  y="5"  width="1"  height="8" fill="#9ec6e8"/>
  <rect x="9"  y="5"  width="6"  height="1" fill="#9ec6e8"/>
  <!-- Flag on top -->
  <rect x="17" y="4"  width="4"  height="2" fill="#ff6f61"/>
  <rect x="17" y="4"  width="1"  height="2" fill="#cc4430"/>
  <!-- Porthole -->
  <rect x="7"  y="15" width="2"  height="2" fill="#9de9ff"/>
  <rect x="11" y="15" width="2"  height="2" fill="#9de9ff"/>
  <!-- Wave foam -->
  <rect x="2"  y="21" width="4"  height="1" fill="#9de9ff" opacity="0.6"/>
  <rect x="26" y="21" width="4"  height="1" fill="#9de9ff" opacity="0.6"/>
</svg>
