    <!-- Mako glow spreading along ground -->
    <rect x="10" y="178" width="8" height="2" fill="#4ae07a"/>
    <rect x="30" y="178" width="8" height="2" fill="#4ae07a"/>
    <rect x="6" y="180" width="4" height="2" fill="#2fb85e"/>
    <rect x="38" y="180" width="4" height="2" fill="#2fb85e"/>

    <!-- Ground -->
    <rect x="0" y="180" width="48" height="20" fill="#02091a"/>
    <rect x="0" y="180" width="48" height="2" fill="#0a1e4a"/>
    <rect x="0" y="196" width="48" height="4" fill="#010612"/>

    <!-- Searchlights -->
    <rect x="5" y="70" width="1" height="15" fill="#c597ff"/>
    <rect x="42" y="60" width="1" height="20" fill="#c597ff"/>
