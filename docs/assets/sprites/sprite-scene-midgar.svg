  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 200" shape-rendering="crispEdges">
    <rect width="40" height="200" fill="none"/>

    <!-- Night sky -->
    <rect x="0" y="0" width="40" height="50" fill="#071634"/>
    <rect x="0" y="0" width="40" height="25" fill="#0a1e4a"/>

    <!-- Stars -->
    <rect x="5" y="4" width="2" height="2" fill="#d9f1ff"/>
    <rect x="15" y="2" width="2" height="2" fill="#d9f1ff"/>
    <rect x="28" y="6" width="2" height="2" fill="#d9f1ff"/>
    <rect x="10" y="14" width="2" height="2" fill="#d9f1ff"/>
    <rect x="24" y="16" width="2" height="2" fill="#d9f1ff"/>
    <rect x="34" y="10" width="2" height="2" fill="#d9f1ff"/>
    <rect x="8" y="24" width="2" height="2" fill="#d9f1ff"/>
    <rect x="32" y="22" width="2" height="2" fill="#d9f1ff"/>

    <!-- Distant background haze -->
    <rect x="0" y="40" width="40" height="10" fill="#0c1f4a"/>

    <!-- Reactor Tower - main structure -->
    <rect x="12" y="35" width="16" height="145" fill="#0a1e4a"/>
    <rect x="14" y="35" width="12" height="145" fill="#0c2a4a"/>
    <rect x="11" y="35" width="18" height="145" fill="none" stroke="#1a3d6e" stroke-width="1"/>

    <!-- Tower horizontal reinforcement bands -->
    <rect x="11" y="55" width="18" height="3" fill="#2b5ea3"/>
    <rect x="11" y="80" width="18" height="3" fill="#2b5ea3"/>
    <rect x="11" y="105" width="18" height="3" fill="#2b5ea3"/>
    <rect x="11" y="130" width="18" height="3" fill="#2b5ea3"/>
    <rect x="11" y="155" width="18" height="3" fill="#2b5ea3"/>

    <!-- Vertical pipes on sides of tower -->
    <rect x="9" y="60" width="3" height="20" fill="#4aa7dd"/>
    <rect x="28" y="60" width="3" height="20" fill="#4aa7dd"/>
    <rect x="9" y="85" width="3" height="20" fill="#4aa7dd"/>
    <rect x="28" y="85" width="3" height="20" fill="#4aa7dd"/>
    <rect x="9" y="110" width="3" height="20" fill="#4aa7dd"/>
    <rect x="28" y="110" width="3" height="20" fill="#4aa7dd"/>

    <!-- Pipe cross-connectors -->
    <rect x="12" y="70" width="3" height="3" fill="#4aa7dd"/>
    <rect x="25" y="70" width="3" height="3" fill="#4aa7dd"/>
    <rect x="12" y="95" width="3" height="3" fill="#4aa7dd"/>
    <rect x="25" y="95" width="3" height="3" fill="#4aa7dd"/>
    <rect x="12" y="120" width="3" height="3" fill="#4aa7dd"/>
    <rect x="25" y="120" width="3" height="3" fill="#4aa7dd"/>

    <!-- Tower windows -->
    <rect x="16" y="60" width="2" height="3" fill="#f7cf67"/>
    <rect x="22" y="60" width="2" height="3" fill="#1a3d6e"/>
    <rect x="16" y="68" width="2" height="3" fill="#1a3d6e"/>
    <rect x="22" y="68" width="2" height="3" fill="#f7cf67"/>
    <rect x="16" y="88" width="2" height="3" fill="#f7cf67"/>
    <rect x="22" y="88" width="2" height="3" fill="#f7cf67"/>
    <rect x="16" y="96" width="2" height="3" fill="#1a3d6e"/>
    <rect x="22" y="96" width="2" height="3" fill="#1a3d6e"/>

    <!-- Mako Crystal / Reactor Core at top -->
    <rect x="14" y="22" width="12" height="14" fill="#74ff98"/>
    <rect x="15" y="22" width="10" height="14" fill="#a0ffb8"/>
    <rect x="13" y="21" width="14" height="16" fill="none" stroke="#74ff98" stroke-width="1"/>

    <!-- Crystal inner glow -->
    <rect x="17" y="24" width="6" height="10" fill="#d9ffe7"/>

    <!-- Mako energy radiating outward -->
    <rect x="10" y="25" width="3" height="3" fill="#4ae07a"/>
    <rect x="27" y="25" width="3" height="3" fill="#4ae07a"/>
    <rect x="8" y="30" width="2" height="2" fill="#2fb85e"/>
    <rect x="30" y="30" width="2" height="2" fill="#2fb85e"/>
    <rect x="10" y="33" width="3" height="3" fill="#4ae07a"/>
    <rect x="27" y="33" width="3" height="3" fill="#4ae07a"/>

    <!-- Left building -->
    <rect x="3" y="85" width="7" height="95" fill="#071634"/>
    <rect x="3" y="85" width="7" height="95" fill="#0a1e4a"/>
    <rect x="4" y="92" width="2" height="3" fill="#f7cf67"/>
    <rect x="7" y="92" width="2" height="3" fill="#1a3d6e"/>
    <rect x="4" y="100" width="2" height="3" fill="#1a3d6e"/>
    <rect x="7" y="100" width="2" height="3" fill="#f7cf67"/>
    <rect x="4" y="108" width="2" height="3" fill="#f7cf67"/>
    <rect x="7" y="108" width="2" height="3" fill="#f7cf67"/>
    <rect x="4" y="116" width="2" height="3" fill="#1a3d6e"/>
    <rect x="7" y="116" width="2" height="3" fill="#f7cf67"/>
    <rect x="4" y="124" width="2" height="3" fill="#f7cf67"/>
    <rect x="7" y="124" width="2" height="3" fill="#1a3d6e"/>

    <!-- Right building -->
    <rect x="30" y="75" width="7" height="105" fill="#071634"/>
    <rect x="30" y="75" width="7" height="105" fill="#0a1e4a"/>
    <rect x="31" y="82" width="2" height="3" fill="#1a3d6e"/>
    <rect x="34" y="82" width="2" height="3" fill="#f7cf67"/>
    <rect x="31" y="90" width="2" height="3" fill="#f7cf67"/>
    <rect x="34" y="90" width="2" height="3" fill="#f7cf67"/>
    <rect x="31" y="98" width="2" height="3" fill="#f7cf67"/>
    <rect x="34" y="98" width="2" height="3" fill="#1a3d6e"/>
    <rect x="31" y="106" width="2" height="3" fill="#1a3d6e"/>
    <rect x="34" y="106" width="2" height="3" fill="#f7cf67"/>

    <!-- Mako pool at base of reactor -->
    <rect x="12" y="176" width="16" height="4" fill="#74ff98"/>
    <rect x="13" y="176" width="14" height="4" fill="#a0ffb8"/>
    <rect x="11" y="175" width="18" height="6" fill="none" stroke="#74ff98" stroke-width="1"/>
    <rect x="16" y="177" width="8" height="3" fill="#d9ffe7"/>

    <!-- Mako glow spreading on ground -->
    <rect x="7" y="179" width="5" height="2" fill="#4ae07a"/>
    <rect x="28" y="179" width="5" height="2" fill="#4ae07a"/>
    <rect x="4" y="181" width="3" height="2" fill="#2fb85e"/>
    <rect x="33" y="181" width="3" height="2" fill="#2fb85e"/>

    <!-- Ground -->
    <rect x="0" y="180" width="40" height="20" fill="#02091a"/>
    <rect x="0" y="180" width="40" height="2" fill="#0a1e4a"/>
    <rect x="0" y="196" width="40" height="4" fill="#010612"/>

    <!-- Ground warning lights -->
    <rect x="6" y="183" width="2" height="2" fill="#ff6f61"/>
    <rect x="19" y="183" width="2" height="2" fill="#ff6f61"/>
    <rect x="32" y="183" width="2" height="2" fill="#ff6f61"/>
  </svg>
