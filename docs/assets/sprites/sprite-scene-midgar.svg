    <rect x="28" y="55" width="3" height="2" fill="#2b5ea3"/>
    <rect x="17" y="85" width="3" height="2" fill="#2b5ea3"/>
    <rect x="28" y="85" width="3" height="2" fill="#2b5ea3"/>
    <rect x="17" y="115" width="3" height="2" fill="#2b5ea3"/>
    <rect x="28" y="115" width="3" height="2" fill="#2b5ea3"/>

