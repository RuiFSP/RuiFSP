    <rect x="17" y="57" width="2" height="28" fill="#2b5ea3"/>
    <rect x="29" y="57" width="2" height="28" fill="#2b5ea3"/>
    <rect x="17" y="87" width="2" height="28" fill="#2b5ea3"/>
    <rect x="29" y="87" width="2" height="28" fill="#2b5ea3"/>

