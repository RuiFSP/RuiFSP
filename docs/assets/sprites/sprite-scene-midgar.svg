    <rect x="32" y="78" width="2" height="3" fill="#f7cf67"/>
    <rect x="35" y="78" width="2" height="3" fill="#1a3d6e"/>
    <rect x="32" y="86" width="2" height="3" fill="#1a3d6e"/>
    <rect x="35" y="86" width="2" height="3" fill="#f7cf67"/>
    <rect x="32" y="94" width="2" height="3" fill="#f7cf67"/>
    <rect x="35" y="94" width="2" height="3" fill="#f7cf67"/>
    <rect x="32" y="102" width="2" height="3" fill="#1a3d6e"/>
    <rect x="35" y="102" width="2" height="3" fill="#1a3d6e"/>
    <rect x="32" y="110" width="2" height="3" fill="#f7cf67"/>
    <rect x="35" y="110" width="2" height="3" fill="#f7cf67"/>
    <rect x="32" y="118" width="2" height="3" fill="#f7cf67"/>
    <rect x="35" y="118" width="2" height="3" fill="#1a3d6e"/>
    <rect x="39" y="98" width="3" height="3" fill="#f7cf67"/>
    <rect x="44" y="98" width="3" height="3" fill="#1a3d6e"/>
    <rect x="39" y="106" width="3" height="3" fill="#1a3d6e"/>
    <rect x="44" y="106" width="3" height="3" fill="#f7cf67"/>
    <rect x="39" y="114" width="3" height="3" fill="#f7cf67"/>
    <rect x="44" y="114" width="3" height="3" fill="#f7cf67"/>
    <rect x="39" y="122" width="3" height="3" fill="#1a3d6e"/>
    <rect x="44" y="122" width="3" height="3" fill="#1a3d6e"/>

    <!-- Mako pool at base of reactor -->
    <rect x="18" y="175" width="12" height="4" fill="#74ff98"/>
    <rect x="19" y="175" width="10" height="4" fill="#a0ffb8"/>
    <rect x="17" y="174" width="14" height="6" fill="none" stroke="#74ff98" stroke-width="1"/>
