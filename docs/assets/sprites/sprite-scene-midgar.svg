    <rect x="5" y="88" width="2" height="3" fill="#f7cf67"/>
    <rect x="2" y="96" width="2" height="3" fill="#1a3d6e"/>
    <rect x="5" y="96" width="2" height="3" fill="#f7cf67"/>
    <rect x="2" y="104" width="2" height="3" fill="#f7cf67"/>
    <rect x="5" y="104" width="2" height="3" fill="#1a3d6e"/>
    <rect x="2" y="112" width="2" height="3" fill="#1a3d6e"/>
    <rect x="5" y="112" width="2" height="3" fill="#f7cf67"/>
    <rect x="2" y="120" width="2" height="3" fill="#f7cf67"/>
    <rect x="5" y="120" width="2" height="3" fill="#f7cf67"/>
    <rect x="2" y="128" width="2" height="3" fill="#1a3d6e"/>
    <rect x="5" y="128" width="2" height="3" fill="#1a3d6e"/>
    <rect x="2" y="136" width="2" height="3" fill="#f7cf67"/>
    <rect x="5" y="136" width="2" height="3" fill="#f7cf67"/>

