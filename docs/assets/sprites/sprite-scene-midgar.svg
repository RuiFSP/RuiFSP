    <!-- Distant towers (background) -->
    <rect x="28" y="50" width="4" height="30" fill="#0c1f4a"/>
    <rect x="34" y="40" width="3" height="40" fill="#0c1f4a"/>
    <rect x="39" y="55" width="4" height="25" fill="#0c1f4a"/>
    <rect x="2" y="45" width="4" height="35" fill="#0c1f4a"/>
    <rect x="8" y="55" width="3" height="25" fill="#0c1f4a"/>

