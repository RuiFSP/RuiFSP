    <!-- Stars -->
    <rect x="4" y="6" width="2" height="2" fill="#d9f1ff"/>
    <rect x="18" y="3" width="2" height="2" fill="#d9f1ff"/>
    <rect x="34" y="10" width="2" height="2" fill="#d9f1ff"/>
    <rect x="10" y="18" width="2" height="2" fill="#d9f1ff"/>
    <rect x="42" y="5" width="2" height="2" fill="#d9f1ff"/>
    <rect x="26" y="15" width="2" height="2" fill="#d9f1ff"/>
    <rect x="5" y="25" width="2" height="2" fill="#d9f1ff"/>
    <rect x="38" y="22" width="2" height="2" fill="#d9f1ff"/>
    <rect x="15" y="30" width="2" height="2" fill="#d9f1ff"/>
