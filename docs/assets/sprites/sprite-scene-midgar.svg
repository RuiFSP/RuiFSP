    <rect x="29" y="55" width="2" height="2" fill="#1a3d6e"/>
    <rect x="29" y="62" width="2" height="2" fill="#f7cf67"/>
    <rect x="35" y="48" width="1" height="2" fill="#1a3d6e"/>
    <rect x="35" y="55" width="1" height="2" fill="#1a3d6e"/>
    <rect x="3" y="52" width="2" height="2" fill="#1a3d6e"/>
    <rect x="3" y="60" width="2" height="2" fill="#f7cf67"/>

