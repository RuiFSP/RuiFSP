    <rect x="20" y="50" width="8" height="130" fill="#0a1e4a"/>
    <rect x="21" y="50" width="6" height="130" fill="#0c2a4a"/>
    <rect x="19" y="80" width="10" height="2" fill="#1a3d6e"/>
    <rect x="19" y="110" width="10" height="2" fill="#1a3d6e"/>
