  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 160" shape-rendering="crispEdges">
    <rect width="32" height="160" fill="none"/>

    <!-- Vertical connection lines -->
    <rect x="5" y="10" width="2" height="30" fill="#1a6aaa" opacity="0.5"/>
    <rect x="15" y="10" width="2" height="30" fill="#1a6aaa" opacity="0.5"/>
    <rect x="25" y="10" width="2" height="30" fill="#1a6aaa" opacity="0.5"/>

    <rect x="5" y="50" width="2" height="30" fill="#1a6aaa" opacity="0.5"/>
    <rect x="15" y="50" width="2" height="30" fill="#1a6aaa" opacity="0.5"/>
    <rect x="25" y="50" width="2" height="30" fill="#1a6aaa" opacity="0.5"/>

    <rect x="5" y="90" width="2" height="30" fill="#1a6aaa" opacity="0.5"/>
    <rect x="15" y="90" width="2" height="30" fill="#1a6aaa" opacity="0.5"/>
    <rect x="25" y="90" width="2" height="30" fill="#1a6aaa" opacity="0.5"/>

    <!-- Cross connection lines -->
    <rect x="7" y="20" width="8" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="17" y="20" width="8" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="7" y="60" width="8" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="17" y="60" width="8" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="7" y="100" width="8" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="17" y="100" width="8" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="7" y="140" width="8" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="17" y="140" width="8" height="2" fill="#1a6aaa" opacity="0.3"/>

    <!-- Diagonal connections -->
    <rect x="7" y="12" width="2" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="9" y="14" width="2" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="11" y="16" width="2" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="13" y="18" width="2" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="17" y="12" width="2" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="19" y="14" width="2" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="21" y="16" width="2" height="2" fill="#1a6aaa" opacity="0.3"/>
    <rect x="23" y="18" width="2" height="2" fill="#1a6aaa" opacity="0.3"/>

    <!-- Data pulses traveling down connections -->
    <rect x="6" y="15" width="1" height="2" fill="#74ff98"/>
    <rect x="16" y="28" width="1" height="2" fill="#7dcfff"/>
    <rect x="26" y="22" width="1" height="2" fill="#c597ff"/>
    <rect x="6" y="55" width="1" height="2" fill="#74ff98"/>
    <rect x="16" y="68" width="1" height="2" fill="#f7cf67"/>
    <rect x="26" y="62" width="1" height="2" fill="#ff6f61"/>
    <rect x="6" y="95" width="1" height="2" fill="#74ff98"/>
    <rect x="16" y="108" width="1" height="2" fill="#7dcfff"/>
    <rect x="26" y="102" width="1" height="2" fill="#c597ff"/>

    <!-- Layer 1 nodes -->
    <rect x="3" y="8" width="4" height="4" fill="#7dcfff" rx="1"/>
    <rect x="4" y="9" width="2" height="2" fill="#d9f1ff"/>
    <rect x="13" y="8" width="4" height="4" fill="#74ff98" rx="1"/>
    <rect x="14" y="9" width="2" height="2" fill="#d9f1ff"/>
    <rect x="23" y="8" width="4" height="4" fill="#c597ff" rx="1"/>
    <rect x="24" y="9" width="2" height="2" fill="#d9f1ff"/>

    <!-- Layer 2 nodes -->
    <rect x="3" y="48" width="4" height="4" fill="#f7cf67" rx="1"/>
    <rect x="4" y="49" width="2" height="2" fill="#d9f1ff"/>
    <rect x="13" y="48" width="4" height="4" fill="#ff6f61" rx="1"/>
    <rect x="14" y="49" width="2" height="2" fill="#d9f1ff"/>
    <rect x="23" y="48" width="4" height="4" fill="#7dcfff" rx="1"/>
    <rect x="24" y="49" width="2" height="2" fill="#d9f1ff"/>

    <!-- Layer 3 nodes -->
    <rect x="3" y="88" width="4" height="4" fill="#c597ff" rx="1"/>
    <rect x="4" y="89" width="2" height="2" fill="#d9f1ff"/>
    <rect x="13" y="88" width="4" height="4" fill="#7dcfff" rx="1"/>
    <rect x="14" y="89" width="2" height="2" fill="#d9f1ff"/>
    <rect x="23" y="88" width="4" height="4" fill="#74ff98" rx="1"/>
    <rect x="24" y="89" width="2" height="2" fill="#d9f1ff"/>

    <!-- Layer 4 nodes -->
    <rect x="3" y="128" width="4" height="4" fill="#ff6f61" rx="1"/>
    <rect x="4" y="129" width="2" height="2" fill="#d9f1ff"/>
    <rect x="13" y="128" width="4" height="4" fill="#c597ff" rx="1"/>
    <rect x="14" y="129" width="2" height="2" fill="#d9f1ff"/>
    <rect x="23" y="128" width="4" height="4" fill="#f7cf67" rx="1"/>
    <rect x="24" y="129" width="2" height="2" fill="#d9f1ff"/>

    <!-- Glowing node halos -->
    <rect x="2" y="7" width="6" height="6" fill="none" stroke="#7dcfff" stroke-width="1" opacity="0.3"/>
    <rect x="12" y="7" width="6" height="6" fill="none" stroke="#74ff98" stroke-width="1" opacity="0.3"/>
    <rect x="22" y="7" width="6" height="6" fill="none" stroke="#c597ff" stroke-width="1" opacity="0.3"/>
    <rect x="2" y="47" width="6" height="6" fill="none" stroke="#f7cf67" stroke-width="1" opacity="0.3"/>
    <rect x="12" y="47" width="6" height="6" fill="none" stroke="#ff6f61" stroke-width="1" opacity="0.3"/>
    <rect x="22" y="47" width="6" height="6" fill="none" stroke="#7dcfff" stroke-width="1" opacity="0.3"/>
    <rect x="2" y="87" width="6" height="6" fill="none" stroke="#c597ff" stroke-width="1" opacity="0.3"/>
    <rect x="12" y="87" width="6" height="6" fill="none" stroke="#7dcfff" stroke-width="1" opacity="0.3"/>
    <rect x="22" y="87" width="6" height="6" fill="none" stroke="#74ff98" stroke-width="1" opacity="0.3"/>
    <rect x="2" y="127" width="6" height="6" fill="none" stroke="#ff6f61" stroke-width="1" opacity="0.3"/>
    <rect x="12" y="127" width="6" height="6" fill="none" stroke="#c597ff" stroke-width="1" opacity="0.3"/>
    <rect x="22" y="127" width="6" height="6" fill="none" stroke="#f7cf67" stroke-width="1" opacity="0.3"/>
  </svg>
