  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 18" shape-rendering="crispEdges">
    <rect width="20" height="18" fill="none"/>
    <!-- Body -->
    <rect x="6" y="4" width="8" height="6" fill="#f7cf67"/>
    <rect x="7" y="3" width="6" height="2" fill="#f7cf67"/>
    <!-- Head -->
    <rect x="11" y="2" width="5" height="4" fill="#f7cf67"/>
    <rect x="12" y="1" width="3" height="2" fill="#f7cf67"/>
    <!-- Beak -->
    <rect x="15" y="3" width="3" height="2" fill="#ff8c42"/>
    <rect x="16" y="5" width="2" height="1" fill="#ff8c42"/>
    <!-- Eye -->
    <rect x="13" y="3" width="2" height="2" fill="#071634"/>
    <rect x="14" y="3" width="1" height="1" fill="#d9f1ff"/>
    <!-- Wing -->
    <rect x="5" y="5" width="2" height="4" fill="#d9a52e"/>
    <rect x="4" y="7" width="1" height="3" fill="#d9a52e"/>
    <!-- Tail feathers -->
    <rect x="3" y="5" width="3" height="2" fill="#d9a52e"/>
    <rect x="2" y="4" width="2" height="1" fill="#d9a52e"/>
    <rect x="2" y="7" width="2" height="1" fill="#d9a52e"/>
    <!-- Legs (running pose) -->
    <rect x="7" y="10" width="2" height="4" fill="#ff8c42"/>
    <rect x="6" y="14" width="3" height="2" fill="#ff8c42"/>
    <rect x="11" y="10" width="2" height="3" fill="#ff8c42"/>
    <rect x="10" y="13" width="3" height="2" fill="#ff8c42"/>
    <!-- Crest -->
    <rect x="13" y="0" width="2" height="2" fill="#d9a52e"/>
  </svg>
